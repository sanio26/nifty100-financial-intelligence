
<!DOCTYPE html>
<html>

<head>
    <title>Nifty100 Financial Intelligence</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 30px;
            margin: 0;
        }

        h1 {
            text-align: center;
            margin-bottom: 40px;
            font-size: 42px;
        }

        .company-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 25px;
        }

        .card {
            background: white;
            padding: 20px;
            border-radius: 15px;
            text-align: center;
            box-shadow: 0px 3px 12px rgba(0,0,0,0.1);
            transition: 0.3s;
            height: 230px;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0px 5px 20px rgba(0,0,0,0.2);
        }

        .card img {
            width: 90px;
            height: 90px;
            object-fit: contain;
            margin-bottom: 10px;
        }

        .company-name {
            font-size: 20px;
            font-weight: bold;
            margin-top: 10px;
            color: black;
        }

        .symbol {
            color: #555;
            font-size: 18px;
            margin-top: 10px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

    </style>

</head>

<body>

    <h1>
        Nifty100 Financial Intelligence
    </h1>

    <div class="company-grid">

        {% for company in companies %}

        <a href="/company/{{ company.symbol }}/">

            <div class="card">

                <img
                    src="{{ company.company_logo }}"
                    onerror="this.src='https://via.placeholder.com/90'"
                    alt="Company Logo"
                >

                <div class="company-name">
                    {{ company.company_name }}
                </div>

                <div class="symbol">
                    {{ company.symbol }}
                </div>

            </div>

        </a>

        {% endfor %}

    </div>

</body>

</html>
