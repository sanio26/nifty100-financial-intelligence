
<!DOCTYPE html>
<html>

<head>

    <title>
        Nifty100 Financial Intelligence
    </title>

    <style>

        body {
            font-family: Arial, sans-serif;
            background: #f5f5f5;
            padding: 30px;
            margin: 0;
        }

        h1 {
            text-align: center;
            font-size: 42px;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: gray;
            margin-bottom: 30px;
        }

        .search-box {
            text-align: center;
            margin-bottom: 40px;
        }

        .search-box input {

            width: 400px;
            padding: 15px;

            border-radius: 12px;
            border: 1px solid #ddd;

            font-size: 18px;
        }

        .search-box button {

            padding: 15px 25px;

            border: none;
            background: #2563eb;

            color: white;
            border-radius: 12px;

            font-size: 18px;
            cursor: pointer;
        }

        .search-box button:hover {
            background: #1e40af;
        }

        .company-grid {

            display: grid;

            grid-template-columns:
            repeat(4, 1fr);

            gap: 25px;
        }

        .card {

            background: white;

            padding: 20px;

            border-radius: 15px;

            text-align: center;

            box-shadow:
            0px 3px 12px
            rgba(0,0,0,0.1);

            transition: 0.3s;

            height: 230px;
        }

        .card:hover {

            transform:
            translateY(-5px);

            box-shadow:
            0px 5px 20px
            rgba(0,0,0,0.2);
        }

        .card img {

            width: 90px;
            height: 90px;

            object-fit: contain;
        }

        .company-name {

            font-size: 20px;
            font-weight: bold;

            margin-top: 10px;
        }

        .symbol {

            color: #666;
            margin-top: 10px;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

    </style>

</head>

<body>

    <h1>
        Nifty100 Financial Intelligence
    </h1>

    <div class="subtitle">

        Search and analyze
        India's top 100 companies

    </div>


    <!-- SEARCH BAR -->

    <div class="search-box">

        <form method="GET">

            <input

                type="text"

                name="search"

                placeholder=
                "Search company..."

                value=
                "{{ search_query }}"
            >

            <button type="submit">

                Search

            </button>

        </form>

    </div>


    <!-- COMPANY GRID -->

    <div class="company-grid">

        {% for company in companies %}

        <a href=
        "/company/{{ company.symbol }}/">

            <div class="card">

                <img
                    src=
                    "{{ company.company_logo }}"

                    onerror=
                    "this.src='https://via.placeholder.com/90'"
                >

                <div class="company-name">

                    {{ company.company_name }}

                </div>

                <div class="symbol">

                    {{ company.symbol }}

                </div>

            </div>

        </a>

        {% endfor %}

    </div>

</body>

</html>
